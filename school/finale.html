<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎮 Квиз для умников: Python и логика</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f9e7b3 0%, #f5b7a8 100%);
            font-family: 'Comic Neue', 'Comic Neue', 'Segoe UI', 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            min-height: 100vh;
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .quiz-wrapper {
            max-width: 750px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 60px 60px 80px 80px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.2), 0 0 0 8px #ffefb9, 0 0 0 12px #f39c6d;
            overflow: hidden;
        }

        .quiz-header {
            background: #ffb347;
            background: linear-gradient(120deg, #ff9a3c, #ff6f3c);
            padding: 1.5rem 1rem;
            text-align: center;
            color: white;
            text-shadow: 3px 3px 0 #c13b00;
        }

        .quiz-header h1 {
            font-size: 2.2rem;
            letter-spacing: 2px;
        }

        .quiz-header p {
            font-size: 1.1rem;
            background: #ffdd99;
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            color: #a34100;
            font-weight: bold;
            margin-top: 8px;
        }

        .progress-area {
            background: #ffe6c7;
            padding: 0.6rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 1rem;
            border-bottom: 3px dashed #ffb347;
        }

        .question-counter {
            background: #ff914d;
            color: white;
            padding: 0.3rem 0.9rem;
            border-radius: 30px;
        }

        .score-preview {
            background: #fdf4dc;
            padding: 0.3rem 0.9rem;
            border-radius: 30px;
            color: #cc6b2c;
        }

        .quiz-body {
            padding: 2rem 1.8rem;
            min-height: 480px;
            display: flex;
            flex-direction: column;
        }

        .question-card {
            background: #fffef7;
            border-radius: 48px;
            padding: 1.5rem;
            box-shadow: 0 12px 18px rgba(0, 0, 0, 0.05);
            border: 2px solid #ffe0b5;
            flex-grow: 1;
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: bold;
            background: #fff0db;
            padding: 0.8rem 1rem;
            border-radius: 50px;
            margin-bottom: 1.2rem;
            color: #b45116;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .q-emoji {
            font-size: 2rem;
        }

        pre {
            background: #1e2f3a;
            color: #f7d44a;
            padding: 0.8rem;
            border-radius: 28px;
            overflow-x: auto;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.9rem;
            margin: 1rem 0;
            border: 3px solid #ffb86b;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
            margin: 1.8rem 0;
        }

        .option {
            background: #fef3e2;
            border-radius: 100px;
            border: 2px solid #ffcd94;
            padding: 0.8rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 1.1rem;
        }

        .option.disabled-option {
            opacity: 0.7;
            cursor: default;
            background: #f5e5d0;
        }

        input[type="radio"] {
            width: 1.4rem;
            height: 1.4rem;
            accent-color: #ff8c42;
            cursor: pointer;
        }

        input[type="radio"]:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        label {
            cursor: pointer;
            font-weight: 500;
            width: 100%;
            color: #5c2e0e;
        }

        .option.disabled-option label {
            cursor: default;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .nav-btn {
            background: #ffbc6e;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s;
            font-family: inherit;
            color: #472100;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 0 #a2591f;
        }

        .nav-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #a2591f;
        }

        .nav-btn.next {
            background: #ff914d;
            color: white;
            box-shadow: 0 4px 0 #b14500;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        .submit-area {
            display: flex;
            justify-content: center;
            margin-top: 1rem;
        }

        .final-submit {
            background: #ff6b3c;
            color: white;
            font-size: 1.5rem;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            border: none;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 6px 0 #942d00;
        }

        .final-submit:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #942d00;
        }

        .result-card {
            background: #e9f5e6;
            border-radius: 40px;
            padding: 1.5rem;
            text-align: center;
            border: 4px solid #ffbd7f;
        }

        .result-score {
            font-size: 3rem;
            font-weight: bold;
            background: gold;
            display: inline-block;
            padding: 0.2rem 1.2rem;
            border-radius: 60px;
            margin: 0.5rem 0;
        }

        .warning-message {
            background: #ffd966;
            color: #aa3e00;
            border-radius: 40px;
            padding: 0.5rem;
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 0.8rem;
            background: #fff0dd;
            font-size: 0.7rem;
            color: #b97f48;
        }

        @media (max-width: 550px) {
            .quiz-body {
                padding: 1rem;
            }
            .question-text {
                font-size: 1.2rem;
            }
            .option {
                font-size: 0.9rem;
                padding: 0.6rem 0.9rem;
            }
            .nav-btn {
                padding: 0.5rem 1rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-wrapper" id="quizApp">
    <div class="quiz-header">
        <h1>🐱 Квиз: Python + задачки 🧠</h1>
        <p>💡 Выбери ответ — изменить будет нельзя! Будь внимателен.</p>
    </div>
    <div class="progress-area">
        <span class="question-counter" id="counterDisplay">Вопрос 1 / 14</span>
        <span class="score-preview" id="previewScore">✨ 0 баллов</span>
    </div>
    <div class="quiz-body" id="quizBody"></div>
    <footer>🎈 На каждый вопрос можно ответить только один раз. Жми «Далее» и не бойся ошибаться!</footer>
</div>

<script>
    // --------------------------------------------------------------
    // ВСЕ ВОПРОСЫ (Python + логические задачи)
    // --------------------------------------------------------------
    const QUESTIONS = [
        { text: "Приоритет операций", code: "print(3 * 2 + 2 ** 3)", options: ["A) 14", "B) 32", "C) 10", "D) 18"], correct: "A" },
        { text: "Повторение и сложение строк", code: "a = \"3\"\nb = \"4\"\nprint(a + b * 2)", options: ["A) 344", "B) 38", "C) 443", "D) 72"], correct: "A" },
        { text: "Срез строки", code: "word = \"Python\"\nprint(word[1:4])", options: ["A) Pyt", "B) yth", "C) ytho", "D) tho"], correct: "B" },
        { text: "Логические операторы в условии", code: "x = 7\nif x > 5 and x < 10:\n    print(\"А\")\nelif x > 5 or x < 2:\n    print(\"Б\")\nelse:\n    print(\"В\")", options: ["A) А", "B) Б", "C) В", "D) АБ"], correct: "A" },
        { text: "Шаг в range()", code: "for i in range(2, 8, 2):\n    print(i)", options: ["A) 2468", "B) 246", "C) 0246", "D) 2468 (дубль)"], correct: "B" },
        { text: "Умножение строки + срез", code: "s = \"abc\" * 2\nprint(s[2:5])", options: ["A) cab", "B) abc", "C) bca", "D) ab"], correct: "A" },
        { text: "Целочисленное деление и остаток", code: "x = 25\ny = x // 6\nz = x % 6\nprint(y, z)", options: ["A) 4 1", "B) 4.16 1", "C) 1 4", "D) 5 0"], correct: "A" },
        { text: "Отрицательные индексы", code: "word = \"computer\"\nprint(word[-1] + word[0])", options: ["A) rc", "B) cr", "C) co", "D) re"], correct: "A" },
        { text: "Отрицание и приоритет условий", code: "x = 15\nif not (x > 10 and x < 20):\n    print(\"Вне\")\nelse:\n    print(\"Внутри\")", options: ["A) Вне", "B) Внутри", "C) Ошибка", "D) None"], correct: "B" },
        { text: "Если все кошки мурлыкают, а Барсик — кошка, то:", code: null, options: ["А) Барсик не мурлыкает", "Б) Барсик может мурлыкать", "В) Барсик мурлыкает", "Г) Барсик — собака"], correct: "C" },
        { text: "Анна финишировала раньше Бориса, а Борис — раньше Клары. Кто пришёл последним?", code: null, options: ["А) Анна", "Б) Борис", "В) Клара", "Г) Невозможно определить"], correct: "C" },
        { text: "Если вчера был понедельник, то какой день будет завтра?", code: null, options: ["А) вторник", "Б) среда", "В) четверг", "Г) пятница"], correct: "B" },
        { text: "В комнате 4 угла. В каждом углу сидит кошка. Напротив каждой кошки — 3 кошки. Сколько всего кошек?", code: null, options: ["А) 4", "Б) 8", "В) 12", "Г) 16"], correct: "A" },
        { text: "Электронные часы (00:00 – 23:59). Сколько раз встречаются ровно три одинаковые цифры? (12:22, 11:13 — но не 11:11)", code: null, options: ["А) 12", "Б) 18", "В) 24", "Г) 34"], correct: "D" }
    ];

    let currentIndex = 0;
    let userAnswers = new Array(QUESTIONS.length).fill(null);

    const quizBody = document.getElementById('quizBody');
    const counterDisplay = document.getElementById('counterDisplay');
    const previewScoreSpan = document.getElementById('previewScore');

    function computeCurrentScore() {
        let score = 0;
        for (let i = 0; i < QUESTIONS.length; i++) {
            if (userAnswers[i] !== null && userAnswers[i] === QUESTIONS[i].correct) score++;
        }
        return score;
    }

    function updatePreviewScore() {
        previewScoreSpan.innerText = `⭐ ${computeCurrentScore()} / ${QUESTIONS.length}`;
    }

    function showWarning(msg) {
        let old = document.querySelector('.warning-message');
        if (old) old.remove();
        const warn = document.createElement('div');
        warn.className = 'warning-message';
        warn.innerText = msg;
        quizBody.appendChild(warn);
        setTimeout(() => warn.remove(), 2000);
    }

    function renderCurrentQuestion() {
        const q = QUESTIONS[currentIndex];
        const selectedValue = userAnswers[currentIndex];
        const isAnswered = (selectedValue !== null); // если уже ответили — блокируем все radio

        const letters = ['A', 'B', 'C', 'D'];
        let optionsHtml = '';
        q.options.forEach((opt, idx) => {
            const letter = letters[idx];
            const checkedAttr = (selectedValue === letter) ? 'checked' : '';
            const disabledAttr = isAnswered ? 'disabled' : '';
            // для визуального эффекта добавим класс disabled-option, если вопрос уже решён
            const optionClass = isAnswered ? 'option disabled-option' : 'option';
            optionsHtml += `
                <div class="${optionClass}" data-opt-letter="${letter}">
                    <input type="radio" name="questionRadio" value="${letter}" id="opt_${letter}" ${checkedAttr} ${disabledAttr}>
                    <label for="opt_${letter}" style="${isAnswered ? 'cursor: default;' : ''}">${opt}</label>
                </div>
            `;
        });

        const codeHtml = q.code ? `<pre>${escapeHtml(q.code)}</pre>` : '';
        const questionNumber = currentIndex + 1;
        counterDisplay.innerText = `📌 Вопрос ${questionNumber} / ${QUESTIONS.length}`;

        const emojis = ['🐍', '💻', '🤔', '🧩', '🐱', '⏰', '🎲', '✨'];
        const randomEmoji = emojis[currentIndex % emojis.length];

        let navigationHtml = '';
        if (currentIndex === QUESTIONS.length - 1) {
            navigationHtml = `<div class="submit-area"><button class="final-submit" id="finalSubmitBtn">🏆 ЗАКОНЧИТЬ КВИЗ 🏆</button></div>`;
        } else {
            navigationHtml = `<button class="nav-btn next" id="nextBtn">Далее ▶</button>`;
        }

        const prevDisabled = (currentIndex === 0) ? 'disabled' : '';
        const html = `
            <div class="question-card">
                <div class="question-text">
                    <span class="q-emoji">${randomEmoji}</span> 
                    <span>${escapeHtml(q.text)}</span>
                </div>
                ${codeHtml}
                <div class="options" id="optionsContainer">
                    ${optionsHtml}
                </div>
                <div class="nav-buttons">
                    <button class="nav-btn" id="prevBtn" ${prevDisabled}>◀ Назад</button>
                    ${navigationHtml}
                </div>
            </div>
        `;
        quizBody.innerHTML = html;

        // Если вопрос ещё не отвечен — добавляем обработчики на radio
        if (!isAnswered) {
            const radioButtons = document.querySelectorAll('input[name="questionRadio"]');
            radioButtons.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    // запоминаем ответ
                    const selectedLetter = e.target.value;
                    userAnswers[currentIndex] = selectedLetter;
                    updatePreviewScore();
                    // после выбора перерисовываем этот же вопрос — теперь все radio станут disabled
                    renderCurrentQuestion();
                });
            });

            // Клик по блоку .option (если не disabled)
            const optionDivs = document.querySelectorAll('.option');
            optionDivs.forEach(div => {
                div.addEventListener('click', (e) => {
                    const radio = div.querySelector('input[type="radio"]');
                    if (radio && !radio.disabled && !radio.checked) {
                        radio.checked = true;
                        const changeEvent = new Event('change', { bubbles: true });
                        radio.dispatchEvent(changeEvent);
                    }
                });
            });
        }

        // Кнопка "Назад"
        const prevBtn = document.getElementById('prevBtn');
        if (prevBtn) {
            prevBtn.addEventListener('click', () => {
                if (currentIndex > 0) {
                    currentIndex--;
                    renderCurrentQuestion();
                }
            });
        }

        // Кнопка "Далее"
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) {
            nextBtn.addEventListener('click', () => {
                if (userAnswers[currentIndex] === null) {
                    showWarning("🎈 Сначала выбери ответ! (Изменить потом будет нельзя)");
                    return;
                }
                if (currentIndex < QUESTIONS.length - 1) {
                    currentIndex++;
                    renderCurrentQuestion();
                }
            });
        }

        // Финальная кнопка
        const finalBtn = document.getElementById('finalSubmitBtn');
        if (finalBtn) {
            finalBtn.addEventListener('click', () => {
                if (userAnswers[currentIndex] === null) {
                    showWarning("📢 Ответь на последний вопрос, прежде чем закончить!");
                    return;
                }
                // проверяем, нет ли вообще пропущенных вопросов
                const missing = [];
                for (let i = 0; i < userAnswers.length; i++) {
                    if (userAnswers[i] === null) missing.push(i+1);
                }
                if (missing.length > 0) {
                    if (confirm(`Ты пропустил(а) вопросы № ${missing.join(', ')}. Вернуться к ним?`)) {
                        currentIndex = missing[0] - 1;
                        renderCurrentQuestion();
                        return;
                    }
                }
                showFinalResults();
            });
        }
    }

    function showFinalResults() {
        let total = QUESTIONS.length;
        let score = 0;
        let detailsHtml = '';
        for (let i = 0; i < total; i++) {
            const userAns = userAnswers[i];
            const correctAns = QUESTIONS[i].correct;
            const isCorrect = (userAns === correctAns);
            if (isCorrect) score++;
            let userLetter = userAns ? userAns : '—';
            let userText = 'Нет ответа';
            if (userAns) {
                const optIndex = ['A','B','C','D'].indexOf(userAns);
                if (optIndex !== -1) userText = QUESTIONS[i].options[optIndex];
            }
            const correctIndex = ['A','B','C','D'].indexOf(correctAns);
            const correctText = QUESTIONS[i].options[correctIndex];
            const mark = isCorrect ? '✅' : '❌';
            detailsHtml += `
                <div style="margin-bottom: 10px; border-bottom:1px solid #ffe0b5; padding:6px;">
                    <strong>${i+1}. ${QUESTIONS[i].text}</strong><br>
                    ${mark} Твой ответ: ${userLetter} — ${userText}<br>
                    <span style="color:#168039;">✔ Правильный: ${correctAns} — ${correctText}</span>
                </div>
            `;
        }
        let message = '';
        if (score === total) message = '🎉 Супер-гений! Ты всё знаешь! 🎉';
        else if (score >= total-2) message = '🌟 Очень круто! Почти отлично! 🌟';
        else if (score >= total/2) message = '👍 Хорошо, но можно и лучше! Поучись ещё.';
        else message = '📚 Ничего, тренировка поможет! Попробуй ещё разок.';

        quizBody.innerHTML = `
            <div class="result-card">
                <h2>🎈 Твой результат 🎈</h2>
                <div class="result-score">${score} / ${total}</div>
                <p style="font-size:1.2rem; margin: 12px 0;">${message}</p>
                <button id="restartQuizBtn" style="background:#ffb347; border:none; padding:10px 20px; border-radius:40px; font-weight:bold; font-size:1rem; cursor:pointer; margin: 10px;">🔄 Пройти заново</button>
                <details style="margin-top: 20px; text-align:left; background:#fff6e8; border-radius: 30px; padding: 10px;">
                    <summary style="font-weight: bold; cursor: pointer;">📖 Посмотреть все ответы</summary>
                    <div style="margin-top: 15px; max-height: 400px; overflow-y: auto; padding: 5px;">
                        ${detailsHtml}
                    </div>
                </details>
            </div>
        `;
        const restartBtn = document.getElementById('restartQuizBtn');
        if (restartBtn) {
            restartBtn.addEventListener('click', () => {
                userAnswers.fill(null);
                currentIndex = 0;
                updatePreviewScore();
                renderCurrentQuestion();
            });
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // старт
    function init() {
        userAnswers.fill(null);
        currentIndex = 0;
        updatePreviewScore();
        renderCurrentQuestion();
    }
    init();
</script>
</body>
</html>
